name: prod

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: .build/scripts/build-image.sh
      - run: .build/scripts/push-image.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: .build/scripts/deploy.sh
        env:
          APP_NAME: shottimer
          NAMESPACE: shottimer
          DEPLOYMENT: shottimer
          K3S_HOST: ${{ secrets.K3S_HOST }}
          K3S_USER: ${{ secrets.K3S_USER }}
          K3S_SSH_KEY: ${{ secrets.K3S_SSH_KEY }}
